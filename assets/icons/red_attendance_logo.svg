<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Main red gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2D55;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
    <!-- Inner highlight gradient -->
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.00" />
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="135%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#C0392B" flood-opacity="0.45"/>
    </filter>
    <!-- Glow filter for check -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="100" y="100" width="824" height="824" rx="196" ry="196" fill="url(#primaryGrad)" filter="url(#shadow)"/>
  <!-- Highlight sheen -->
  <rect x="100" y="100" width="824" height="412" rx="196" ry="196" fill="url(#highlightGrad)"/>

  <!-- Shield shape (centered, refined) -->
  <path
    d="M512 228
       L718 318
       Q730 323 730 337
       L730 512
       Q730 630 620 700
       L530 752
       Q520 758 504 758
       L494 758
       Q478 758 468 752
       L378 700
       Q268 630 268 512
       L268 337
       Q268 323 280 318
       Z"
    fill="rgba(255,255,255,0.13)"
    stroke="rgba(255,255,255,0.55)"
    stroke-width="10"
  />

  <!-- Checkmark — bold, white, centered on shield -->
  <path
    d="M388 500
       L464 580
       L650 385"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="68"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Subtle bottom pulse ring for polish -->
  <ellipse cx="512" cy="900" rx="180" ry="22" fill="#C0392B" opacity="0.30"/>
</svg>
